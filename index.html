<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DIAZ</title>
<meta name="description" content="DIAZ">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- The water surface. Background + logotype live inside this canvas so they can be refracted. -->
  <canvas id="water" aria-hidden="true"></canvas>

  <!-- Chrome sits on top of the water, undistorted, exactly like the reference. -->
  <header class="bar bar--top">
    <!-- One section landing page per category; hrefs land once each is built. -->
    <nav class="bar__group bar__group--left" aria-label="Primary">
      <a href="ecommerce/index.html">Ecommerce</a>
      <a href="communication/index.html">Communication</a>
      <a href="game/index.html">Game</a>
      <a href="movie/index.html">Movie</a>
      <a href="mobile/index.html">Mobile</a>
    </nav>

    <a class="mark" href="#" aria-label="DIAZ home">
      <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <path d="M20 4.5c0 0-9.4 11-9.4 17.4a9.4 9.4 0 0 0 18.8 0C29.4 15.5 20 4.5 20 4.5Z"
              fill="currentColor"/>
        <ellipse cx="20" cy="30.5" rx="13" ry="3.6" stroke="currentColor" stroke-width="1.3" opacity=".55"/>
        <ellipse cx="20" cy="31.5" rx="18.2" ry="5.2" stroke="currentColor" stroke-width="1.1" opacity=".25"/>
      </svg>
    </a>

    <div class="bar__group bar__group--right">
      <a href="#">Become a member, join DIAZ</a>
    </div>
  </header>

  <footer class="bar bar--bottom">
    <span class="bar__copy">&copy; DIAZ 2026</span>
    <!-- Placeholder hrefs like the top bar's: each lands once its page exists. -->
    <nav class="bar__group" aria-label="Secondary">
      <a href="tourism/index.html">Tourism</a>
      <a href="travels/index.html">Travels</a>
      <a href="#">Rocks</a>
    </nav>
  </footer>

  <!-- Shown only if WebGL2 is unavailable; the page still reads as a landing page. -->
  <div id="fallback" class="fallback" hidden>DIAZ</div>

  <script src="water.js"></script>
</body>
</html>
